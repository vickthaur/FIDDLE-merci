<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci ! - Le Bistrot Paris</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --success: #10b981;
            --success-hover: #059669;
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --text-dark: #2b2d42;
            --text-muted: #8d99ae;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-dark); padding: 20px; }
        
        .card { background: #ffffff; width: 100%; max-width: 420px; border-radius: 20px; padding: 50px 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.02); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--success); }
        
        .icon { font-size: 56px; margin-bottom: 15px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; color: var(--text-dark); }
        .subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; }
        .highlight { color: var(--success); font-weight: 700; }
        
        .btn { display: inline-block; width: 100%; background: #f1f3f5; color: var(--text-dark); text-decoration: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 600; transition: all 0.3s ease; }
        .btn:hover { background: #e9ecef; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">✨</div>
        <h1>C'est validé !</h1>
        
        <p class="subtitle">
            Merci pour votre inscription.<br>
            Vous venez de débloquer votre <span class="highlight">1er point</span> !
        </p>

        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 35px; line-height: 1.6;">
            Surveillez votre boîte mail, le récapitulatif de vos points vient de vous être envoyé.
        </p>

        <a href="https://vickthaur.github.io/FIDDLE/" class="btn">Retourner à l'accueil</a>
    </div>

</body>
</html>
